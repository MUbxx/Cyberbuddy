```html
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Course Player</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-950 text-white flex h-screen">

<!-- LESSON SIDEBAR -->

<div class="w-80 bg-slate-900 border-r border-slate-800 overflow-y-auto">

<div class="p-5 border-b border-slate-800">

<h2 id="courseTitle" class="text-lg font-bold"></h2>

<div class="w-full bg-slate-800 rounded mt-3">
<div id="progressBar" class="bg-cyan-400 h-2 rounded"></div>
</div>

</div>

<div id="moduleList"></div>

</div>


<!-- VIDEO PLAYER -->

<div class="flex-1 flex flex-col">

<div class="flex-1 bg-black">

<iframe
id="videoPlayer"
class="w-full h-full"
allowfullscreen
></iframe>

</div>

<div class="p-6 bg-slate-900 border-t border-slate-800">

<h3 id="lessonTitle" class="text-xl font-bold"></h3>

<button
id="markComplete"
class="mt-4 bg-cyan-500 px-5 py-2 rounded text-black font-bold">

Mark Lesson Complete

</button>

</div>

</div>

<script type="module" src="js/course.js"></script>

</body>
</html>
