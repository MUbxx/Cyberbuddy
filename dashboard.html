<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cyber Buddy Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#0f172a;
}

.sidebar{
background:#111827;
}

.card{
transition:all .25s ease;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 15px 25px rgba(0,0,0,.4);
}

</style>

</head>

<body class="text-gray-100 flex">

<!-- SIDEBAR -->

<aside class="sidebar w-64 min-h-screen p-6 space-y-6">

<h1 class="text-2xl font-bold text-cyan-400">
Cyber Buddy
</h1>

<nav class="space-y-2">

<button onclick="showTab('dashboard')" class="block w-full text-left hover:text-cyan-400">
Dashboard
</button>

<button onclick="showTab('mycourses')" class="block w-full text-left hover:text-cyan-400">
My Courses
</button>

<button onclick="showTab('profile')" class="block w-full text-left hover:text-cyan-400">
Profile
</button>

<button onclick="showTab('settings')" class="block w-full text-left hover:text-cyan-400">
Settings
</button>

</nav>

<button id="logoutBtn"
class="bg-red-500 px-3 py-2 rounded text-sm">

Logout

</button>

</aside>



<main class="flex-1 p-10 space-y-10">

<!-- HEADER -->

<div class="flex justify-between items-center">

<h2 class="text-2xl font-bold">
Learning Dashboard
</h2>

<input id="searchCourse"
placeholder="Search courses..."
class="bg-gray-800 p-2 rounded w-60">

</div>



<!-- DASHBOARD TAB -->

<section id="dashboard" class="tab">

<h3 class="text-xl mb-6">
Available Courses
</h3>

<div id="coursesGrid"
class="grid grid-cols-3 gap-6">

</div>

</section>



<!-- MY COURSES -->

<section id="mycourses" class="tab hidden">

<h3 class="text-xl mb-6">
My Courses
</h3>

<div id="myCoursesGrid"
class="grid grid-cols-3 gap-6">

</div>

</section>



<!-- PROFILE -->

<section id="profile" class="tab hidden">

<h3 class="text-xl mb-6">
Profile
</h3>

<div class="bg-gray-800 p-6 rounded w-96">

<p>Name: <span id="userName"></span></p>
<p>Email: <span id="userEmail"></span></p>

</div>

</section>



<!-- SETTINGS -->

<section id="settings" class="tab hidden">

<h3 class="text-xl mb-6">
Settings
</h3>

<div class="bg-gray-800 p-6 rounded w-96 space-y-3">

<button class="bg-cyan-500 px-4 py-2 rounded text-black">
Change Password
</button>

<button class="bg-yellow-500 px-4 py-2 rounded text-black">
Enable 2FA
</button>

</div>

</section>

</main>



<script type="module" src="js/dashboard.js"></script>

</body>
</html>
