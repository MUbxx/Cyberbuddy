<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cyber Buddy | Student Console</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

body{
font-family:Inter,sans-serif;
background:#070b14;
color:#e2e8f0;
overflow:hidden;
}

/* glass */

.glass{
background:rgba(17,24,39,.6);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.05);
}

/* sidebar */

.sidebar-item{
transition:.2s;
color:#94a3b8;
}

.sidebar-item:hover{
background:rgba(255,255,255,.05);
color:white;
}

.sidebar-item.active{
background:#2563eb;
color:white;
}

/* course */

.course-card{
transition:.3s;
}

.course-card:hover{
transform:translateY(-6px);
box-shadow:0 15px 25px rgba(0,0,0,.6);
}

/* scroll */

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#1e293b;border-radius:10px}

</style>
</head>


<body class="flex h-screen">

<!-- SIDEBAR -->

<aside id="sidebar"
class="w-72 bg-[#060a13] border-r border-slate-800 flex flex-col p-6 transition-all duration-300">

<div class="flex items-center justify-between mb-10">

<div class="flex items-center gap-3">

<div class="h-10 w-10 bg-blue-600 rounded-xl flex items-center justify-center text-white">
<i class="fas fa-bolt"></i>
</div>

<h1 class="font-bold text-xl">
Cyber<span class="text-blue-500">Buddy</span>
</h1>

</div>

<button id="toggleSidebar" class="text-slate-400">
<i class="fas fa-bars"></i>
</button>

</div>


<nav class="flex-1 space-y-2">

<button onclick="switchTab('dashboard',this)"
class="sidebar-item active w-full flex gap-3 px-4 py-3 rounded-xl">

<i class="fas fa-th-large"></i>
Dashboard

</button>


<button onclick="switchTab('mycourses',this)"
class="sidebar-item w-full flex gap-3 px-4 py-3 rounded-xl">

<i class="fas fa-play-circle"></i>
My Courses

</button>


<button onclick="switchTab('certificates',this)"
class="sidebar-item w-full flex gap-3 px-4 py-3 rounded-xl">

<i class="fas fa-award"></i>
Certificates

</button>


<button onclick="switchTab('billing',this)"
class="sidebar-item w-full flex gap-3 px-4 py-3 rounded-xl">

<i class="fas fa-receipt"></i>
Billing

</button>


<button onclick="switchTab('profile',this)"
class="sidebar-item w-full flex gap-3 px-4 py-3 rounded-xl">

<i class="fas fa-user"></i>
Profile

</button>


<button onclick="switchTab('security',this)"
class="sidebar-item w-full flex gap-3 px-4 py-3 rounded-xl">

<i class="fas fa-shield-alt"></i>
Security

</button>

</nav>


<button id="logoutBtn"
class="text-red-500 mt-6 py-3 rounded-xl hover:bg-red-500/10">

<i class="fas fa-sign-out-alt"></i>
Sign Out

</button>

</aside>


<!-- MAIN -->

<main class="flex-1 flex flex-col">


<header class="h-20 border-b border-slate-800 flex items-center justify-between px-10">

<h2 id="viewTitle" class="text-xl font-bold">
Student Dashboard
</h2>

<input id="searchCourse"
placeholder="Search courses..."
class="bg-slate-900 border border-slate-800 px-4 py-2 rounded-lg text-sm">

</header>



<div class="flex-1 overflow-y-auto p-10 space-y-10">


<!-- DASHBOARD -->

<section id="dashboard">

<div class="grid md:grid-cols-3 gap-6">

<div class="glass p-6 rounded-xl">
<p class="text-xs text-slate-400">Courses</p>
<h3 id="statCourses" class="text-3xl font-bold">0</h3>
</div>

<div class="glass p-6 rounded-xl">
<p class="text-xs text-slate-400">Certificates</p>
<h3 id="statCerts" class="text-3xl font-bold">0</h3>
</div>

<div class="glass p-6 rounded-xl">
<p class="text-xs text-slate-400">Learning Hours</p>
<h3 class="text-3xl font-bold">24</h3>
</div>

</div>


<h3 class="text-xl font-bold mt-10">Available Courses</h3>

<div id="coursesGrid"
class="grid md:grid-cols-2 xl:grid-cols-3 gap-8 mt-6"></div>

</section>



<!-- MY COURSES -->

<section id="mycourses" class="hidden">

<h3 class="text-xl font-bold">My Courses</h3>

<div id="myCoursesGrid"
class="grid md:grid-cols-2 xl:grid-cols-3 gap-8 mt-6"></div>

</section>



<!-- CERTIFICATES -->

<section id="certificates" class="hidden">

<h3 class="text-xl font-bold">Certificates</h3>

<div id="certList" class="space-y-4 mt-6"></div>

</section>



<!-- BILLING -->

<section id="billing" class="hidden">

<h3 class="text-xl font-bold">Invoices</h3>

<div id="invoiceList" class="space-y-4 mt-6"></div>

</section>



<!-- PROFILE -->

<section id="profile" class="hidden">

<div class="glass p-8 rounded-xl max-w-xl space-y-6">

<div>

<h3 id="userName" class="text-2xl font-bold"></h3>
<p id="userEmail" class="text-slate-400"></p>

</div>

<input id="editName"
placeholder="Update name"
class="w-full bg-slate-900 border border-slate-800 p-3 rounded-lg">

<input id="editPhone"
placeholder="Phone"
class="w-full bg-slate-900 border border-slate-800 p-3 rounded-lg">

<button id="saveProfile"
class="bg-blue-600 px-6 py-3 rounded-lg">

Update Profile

</button>

</div>

</section>



<!-- SECURITY -->

<section id="security" class="hidden">

<button id="resetBtn"
class="bg-blue-600 px-6 py-3 rounded-lg">

Send Password Reset

</button>

</section>


</div>

</main>


<script type="module" src="js/dashboard.js"></script>


<script>

function switchTab(id,btn){

document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"))
document.getElementById(id).classList.remove("hidden")

document.querySelectorAll(".sidebar-item").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")

}

</script>

</body>
</html>
