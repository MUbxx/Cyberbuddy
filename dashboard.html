<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CyberBuddy Student Portal</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
background:#0b0f1a;
font-family:Inter,sans-serif;
color:#e2e8f0;
overflow:hidden;
}

/* sidebar */

#sidebar{
transition:width .3s ease;
width:260px;
min-width:260px;
}

#sidebar.collapsed{
width:90px;
min-width:90px;
}

#sidebar.collapsed span{
display:none;
}

/* glass cards */

.glass{
background:rgba(30,41,59,.45);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.05);
}

/* hover cards */

.card-hover:hover{
transform:translateY(-4px);
transition:.25s;
border-color:#22d3ee;
}

/* scrollbar */

::-webkit-scrollbar{
width:6px;
}

::-webkit-scrollbar-thumb{
background:#1e293b;
border-radius:10px;
}

/* tabs */

.tab{
display:none;
}

.tab.active{
display:block;
}

</style>

</head>


<body class="flex h-screen">

<!-- SIDEBAR -->

<aside id="sidebar"
class="bg-[#060a13] border-r border-slate-800 flex flex-col p-6">

<div class="flex items-center justify-between mb-8">

<div class="flex items-center gap-3">

<div class="h-10 w-10 bg-cyan-500 rounded-xl flex items-center justify-center">
<i class="fas fa-bolt"></i>
</div>

<h1 class="text-xl font-bold">
Cyber<span class="text-cyan-400">Buddy</span>
</h1>

</div>

<button id="toggleSidebar">
<i class="fas fa-bars"></i>
</button>

</div>


<nav class="flex-1 space-y-2">

<button class="navBtn w-full flex items-center gap-3 p-3 rounded hover:bg-slate-800"
data-tab="dashboard">
<i class="fas fa-home"></i>
<span>Dashboard</span>
</button>

<button class="navBtn w-full flex items-center gap-3 p-3 rounded hover:bg-slate-800"
data-tab="courses">
<i class="fas fa-play-circle"></i>
<span>My Courses</span>
</button>

<button class="navBtn w-full flex items-center gap-3 p-3 rounded hover:bg-slate-800"
data-tab="certificates">
<i class="fas fa-award"></i>
<span>Certificates</span>
</button>

<button class="navBtn w-full flex items-center gap-3 p-3 rounded hover:bg-slate-800"
data-tab="billing">
<i class="fas fa-file-invoice"></i>
<span>Billing</span>
</button>

<button class="navBtn w-full flex items-center gap-3 p-3 rounded hover:bg-slate-800"
data-tab="profile">
<i class="fas fa-user"></i>
<span>Profile</span>
</button>

<button class="navBtn w-full flex items-center gap-3 p-3 rounded hover:bg-slate-800"
data-tab="security">
<i class="fas fa-shield-alt"></i>
<span>Security</span>
</button>

</nav>

<button id="logoutBtn"
class="bg-red-500 hover:bg-red-600 py-3 rounded-lg mt-6">

Logout

</button>

</aside>



<!-- MAIN CONTENT -->

<main class="flex-1 flex flex-col">

<header class="h-20 border-b border-slate-800 flex items-center justify-between px-10">

<div>

<h2 id="viewTitle" class="text-xl font-bold">
Dashboard
</h2>

<p id="viewSubtitle"
class="text-xs text-slate-500">
Welcome back to CyberBuddy
</p>

</div>

<input id="searchCourse"
placeholder="Search courses..."
class="bg-slate-900 border border-slate-700 px-4 py-2 rounded-lg text-sm">

</header>



<div class="flex-1 overflow-y-auto p-10 space-y-10">


<!-- DASHBOARD TAB -->

<section id="dashboard" class="tab active">

<div class="grid md:grid-cols-3 gap-6">

<div class="glass card-hover p-6 rounded-xl">
<p class="text-slate-400 text-sm">Enrolled Courses</p>
<h3 id="statCourses" class="text-3xl font-bold">0</h3>
</div>

<div class="glass card-hover p-6 rounded-xl">
<p class="text-slate-400 text-sm">Certificates</p>
<h3 id="statCertificates" class="text-3xl font-bold">0</h3>
</div>

<div class="glass card-hover p-6 rounded-xl">
<p class="text-slate-400 text-sm">Rank</p>
<h3 class="text-3xl font-bold">Level 1</h3>
</div>

</div>


<h3 class="text-xl font-bold mt-10">
Available Courses
</h3>

<div id="coursesGrid"
class="grid md:grid-cols-3 gap-8 mt-6">
</div>

</section>



<!-- MY COURSES -->

<section id="courses" class="tab">

<h3 class="text-xl font-bold mb-6">
Your Learning
</h3>

<div id="myCoursesGrid"
class="grid md:grid-cols-3 gap-8">
</div>

</section>



<!-- CERTIFICATES -->

<section id="certificates" class="tab">

<h3 class="text-xl font-bold mb-6">
Certificates
</h3>

<div id="certList" class="space-y-4"></div>

</section>



<!-- BILLING -->

<section id="billing" class="tab">

<h3 class="text-xl font-bold mb-6">
Billing History
</h3>

<div id="invoiceList" class="space-y-4"></div>

</section>



<!-- PROFILE -->

<section id="profile" class="tab">

<div class="grid md:grid-cols-3 gap-6">

<!-- PROFILE CARD -->

<div class="glass p-6 rounded-xl text-center">

<img id="profilePhoto"
class="w-24 h-24 rounded-full mx-auto border-4 border-cyan-400 object-cover mb-4"
src="https://ui-avatars.com/api/?name=User">

<h2 id="profileName" class="text-lg font-bold">Student</h2>

<p id="profileEmail" class="text-sm text-slate-400 mt-1"></p>

</div>


<!-- PROFILE FORM -->

<div class="glass p-6 rounded-xl md:col-span-2 space-y-4">

<h3 class="text-xl font-bold">
Profile Settings
</h3>

<input id="editName"
class="w-full bg-slate-900 border border-slate-700 p-3 rounded opacity-60 cursor-not-allowed"
placeholder="Full Name"
readonly>

<input id="editPhone"
class="w-full bg-slate-900 border border-slate-700 p-3 rounded"
placeholder="Phone Number">

<input id="editPhoto"
class="w-full bg-slate-900 border border-slate-700 p-3 rounded"
placeholder="Profile Photo URL">

<button id="saveProfile"
class="bg-cyan-500 hover:bg-cyan-400 px-6 py-3 rounded">

Update Profile

</button>

</div>

</div>

</section>



<!-- SECURITY -->

<section id="security" class="tab">

<div class="glass p-8 rounded-xl space-y-6 max-w-xl">

<h3 class="text-xl font-bold">
Account Security
</h3>

<button id="resetBtn"
class="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded">

Send Password Reset Email

</button>

</div>

</section>


</div>

</main>


<script type="module" src="js/dashboard.js"></script>

</body>
</html>
