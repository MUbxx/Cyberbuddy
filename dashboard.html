<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cyber Buddy | Student Console</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
background:#070b14;
color:#e2e8f0;
font-family:Inter,sans-serif;
overflow:hidden;
}

/* glass cards */

.glass{
background:rgba(17,24,39,.6);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.05);
}

/* SIDEBAR */

#sidebar{
transition:width .3s ease;
width:288px;
min-width:288px;
}

#sidebar.collapsed{
width:85px;
min-width:85px;
padding:1.5rem 1rem;
}

#sidebar.collapsed span,
#sidebar.collapsed h1{
display:none;
}

#sidebar.collapsed .sidebar-item{
justify-content:center;
padding-left:0;
padding-right:0;
}

.sidebar-item{
transition:.2s;
color:#94a3b8;
}

.sidebar-item:hover{
background:rgba(255,255,255,.05);
color:white;
}

.sidebar-item.active{
background:#2563eb;
color:white;
}

.course-card:hover{
transform:translateY(-5px);
box-shadow:0 15px 25px rgba(0,0,0,.6);
}

</style>

</head>

<body class="flex h-screen">

<!-- SIDEBAR -->

<aside id="sidebar"
class="bg-[#060a13] border-r border-slate-800 flex flex-col p-6">

<div class="flex items-center justify-between mb-8">

<div class="flex items-center gap-3">

<div class="h-10 w-10 bg-blue-600 rounded-xl flex items-center justify-center">
<i class="fas fa-bolt"></i>
</div>

<h1 class="text-xl font-bold">
Cyber<span class="text-blue-500">Buddy</span>
</h1>

</div>

<button id="toggleSidebar">
<i class="fas fa-bars"></i>
</button>

</div>


<nav class="flex-1 space-y-2">

<button onclick="switchTab('dashboard',this)"
class="sidebar-item active w-full flex items-center gap-3 px-4 py-3 rounded-xl">

<i class="fas fa-th-large"></i>
<span>Dashboard</span>

</button>


<button onclick="switchTab('mycourses',this)"
class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl">

<i class="fas fa-play-circle"></i>
<span>My Courses</span>

</button>


<button onclick="switchTab('certificates',this)"
class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl">

<i class="fas fa-award"></i>
<span>Certificates</span>

</button>


<button onclick="switchTab('billing',this)"
class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl">

<i class="fas fa-receipt"></i>
<span>Billing</span>

</button>


<button onclick="switchTab('profile',this)"
class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl">

<i class="fas fa-user"></i>
<span>Profile</span>

</button>


<button onclick="switchTab('security',this)"
class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl">

<i class="fas fa-shield-alt"></i>
<span>Security</span>

</button>

</nav>


<button id="logoutBtn"
class="text-red-500 mt-6 py-3 rounded-xl hover:bg-red-500/10">

<i class="fas fa-sign-out-alt"></i>
<span>Sign Out</span>

</button>

</aside>


<!-- MAIN -->

<main class="flex-1 flex flex-col">

<header class="h-20 border-b border-slate-800 flex items-center justify-between px-10">

<h2 class="text-xl font-bold">Student Dashboard</h2>

<input id="searchCourse"
placeholder="Search courses..."
class="bg-slate-900 border border-slate-800 px-4 py-2 rounded-lg text-sm">

</header>


<div class="flex-1 overflow-y-auto p-10 space-y-10">


<section id="dashboard">

<h3 class="text-xl font-bold">Available Courses</h3>

<div id="coursesGrid"
class="grid md:grid-cols-2 xl:grid-cols-3 gap-8 mt-6"></div>

</section>


<section id="mycourses" class="hidden">

<h3 class="text-xl font-bold">My Courses</h3>

<div id="myCoursesGrid"
class="grid md:grid-cols-2 xl:grid-cols-3 gap-8 mt-6"></div>

</section>


<section id="certificates" class="hidden">

<h3 class="text-xl font-bold">Certificates</h3>

<div id="certList" class="space-y-4 mt-6"></div>

</section>


<section id="billing" class="hidden">

<h3 class="text-xl font-bold">Billing</h3>

<div id="invoiceList" class="space-y-4 mt-6"></div>

</section>


<section id="profile" class="hidden">

<div class="glass p-8 rounded-xl max-w-xl space-y-4">

<h3 id="userName" class="text-2xl font-bold"></h3>

<p id="userEmail" class="text-slate-400"></p>

<input id="editName"
class="w-full bg-slate-900 border border-slate-700 p-3 rounded-lg"
placeholder="Update Name">

<input id="editPhone"
class="w-full bg-slate-900 border border-slate-700 p-3 rounded-lg"
placeholder="Phone Number">

<button id="saveProfile"
class="bg-blue-600 px-6 py-3 rounded-lg">

Update Profile

</button>

</div>

</section>


<section id="security" class="hidden">

<button id="resetBtn"
class="bg-blue-600 px-6 py-3 rounded-lg">

Send Password Reset Link

</button>

</section>

</div>

</main>


<script type="module" src="js/dashboard.js"></script>

<script>

function switchTab(id,btn){

document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"))
document.getElementById(id).classList.remove("hidden")

document.querySelectorAll(".sidebar-item").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")

if(id==="certificates") window.loadCertificates()
if(id==="billing") window.loadInvoices()

}

</script>

</body>
</html>
