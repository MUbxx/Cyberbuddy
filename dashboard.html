<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cyber Buddy Academy</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-900 text-white min-h-screen">

<!-- NAVBAR -->

<header class="flex justify-between items-center p-4 border-b border-gray-700 bg-gray-950">

<h1 class="text-cyan-400 text-xl font-bold">
Cyber Buddy Academy
</h1>

<nav class="flex gap-6 items-center">

<button onclick="showSection('dashboard')" class="hover:text-cyan-400">
Dashboard
</button>

<button onclick="showSection('courses')" class="hover:text-cyan-400">
My Courses
</button>

<button onclick="showSection('profile')" class="hover:text-cyan-400">
Profile
</button>

<button id="logoutBtn"
class="bg-red-500 px-3 py-1 rounded hover:bg-red-600">
Logout
</button>

</nav>

</header>



<!-- DASHBOARD SECTION -->

<section id="dashboard" class="p-8">

<h2 class="text-2xl mb-6 font-semibold">
Available Courses
</h2>

<div id="courseList"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
</div>

</section>



<!-- MY COURSES -->

<section id="courses" class="p-8 hidden">

<h2 class="text-2xl mb-6 font-semibold">
My Courses
</h2>

<div id="myCourses"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
</div>

</section>



<!-- PROFILE -->

<section id="profile" class="p-8 hidden">

<h2 class="text-2xl mb-6 font-semibold">
Profile
</h2>

<div class="bg-gray-800 p-6 rounded w-96 shadow">

<p class="mb-3">
<span class="text-gray-400">Name:</span>
<span id="name"></span>
</p>

<p>
<span class="text-gray-400">Email:</span>
<span id="email"></span>
</p>

</div>

</section>



<!-- COURSE CARD TEMPLATE STYLE -->

<style>

.courseCard{
background:#1f2937;
padding:20px;
border-radius:10px;
transition:0.3s;
}

.courseCard:hover{
transform:translateY(-4px);
box-shadow:0 0 10px rgba(0,255,255,0.2);
}

</style>



<script type="module" src="js/dashboard.js"></script>

</body>
</html>
