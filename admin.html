<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cyber Buddy Admin</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

body{background:#0f172a;}

.glass{
background:rgba(30,41,59,0.7);
backdrop-filter:blur(10px);
}

</style>

</head>

<body class="flex text-gray-100 min-h-screen">

<!-- SIDEBAR -->

<aside class="w-64 glass border-r border-gray-800 flex flex-col">

<div class="p-6">

<h1 class="text-2xl font-black text-cyan-400">
CYBER<span class="text-white">BUDDY</span>
</h1>

<p class="text-xs text-gray-500 uppercase">
Admin Terminal
</p>

</div>

<nav class="flex-1 px-4 space-y-2">

<a onclick="showTab('dashboard')" class="cursor-pointer block p-3 hover:bg-gray-800 rounded">
Dashboard
</a>

<a onclick="showTab('users')" class="cursor-pointer block p-3 hover:bg-gray-800 rounded">
Users
</a>

<a onclick="showTab('courses')" class="cursor-pointer block p-3 hover:bg-gray-800 rounded">
Courses
</a>

</nav>

<div class="p-4 border-t border-gray-800">

<button id="logoutBtn"
class="w-full bg-red-500 text-white p-2 rounded-lg">

Logout

</button>

</div>

</aside>


<main class="flex-1 overflow-y-auto p-8 space-y-8">

<!-- DASHBOARD -->

<section id="dashboard" class="tab">

<h2 class="text-xl mb-4 font-bold">
Dashboard
</h2>

<div class="grid grid-cols-3 gap-6">

<div class="glass p-6 rounded-xl">
<p>Total Users</p>
<h3 id="totalUsers" class="text-3xl font-bold">0</h3>
</div>

<div class="glass p-6 rounded-xl">
<p>Total Courses</p>
<h3 id="totalCourses" class="text-3xl font-bold">0</h3>
</div>

<div class="glass p-6 rounded-xl">
<p>Total Enrollments</p>
<h3 id="totalEnrollments" class="text-3xl font-bold">0</h3>
</div>

</div>

</section>



<!-- USERS -->

<section id="users" class="tab hidden">

<h2 class="text-xl mb-4 font-bold">
Users
</h2>

<input id="userSearch"
placeholder="Search user"
class="bg-gray-800 p-2 rounded mb-4">

<div class="overflow-x-auto">

<table class="w-full text-sm">

<thead class="text-gray-400 border-b border-gray-800">

<tr>

<th class="p-4">Name</th>

<th class="p-4">Email</th>

<th class="p-4">Created</th>

<th class="p-4">Courses</th>

<th class="p-4">Grant</th>

<th class="p-4">Action</th>

</tr>

</thead>

<tbody id="usersList"></tbody>

</table>

</div>

</section>



<!-- COURSES -->

<section id="courses" class="tab hidden">

<h2 class="text-xl mb-4 font-bold">
Courses
</h2>

<div class="space-y-3 mb-6">

<input id="title"
placeholder="Course Title"
class="bg-gray-800 p-3 rounded w-full">

<input id="video"
placeholder="Video URL"
class="bg-gray-800 p-3 rounded w-full">

<button id="uploadBtn"
class="bg-cyan-500 text-black px-4 py-2 rounded">

Upload Course

</button>

</div>

<div id="coursesList" class="space-y-2"></div>

</section>

</main>

<script type="module" src="js/admin.js"></script>

</body>
</html>
