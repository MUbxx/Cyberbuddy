```html
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CyberBuddy Admin</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#0f172a;
}

.glass{
background:rgba(30,41,59,0.7);
backdrop-filter:blur(10px);
}

</style>

</head>

<body class="flex text-gray-100 min-h-screen">

<!-- SIDEBAR -->

<aside class="w-64 glass border-r border-gray-800 flex flex-col">

<div class="p-6">

<h1 class="text-2xl font-black text-cyan-400">
CYBER<span class="text-white">BUDDY</span>
</h1>

<p class="text-xs text-gray-400">
Admin Control
</p>

</div>

<nav class="flex-1 px-4 space-y-2">

<a onclick="showTab('dashboard')" class="block p-3 hover:bg-gray-800 rounded cursor-pointer">
Dashboard
</a>

<a onclick="showTab('users')" class="block p-3 hover:bg-gray-800 rounded cursor-pointer">
Users
</a>

<a onclick="showTab('courses')" class="block p-3 hover:bg-gray-800 rounded cursor-pointer">
Courses
</a>

</nav>

<div class="p-4 border-t border-gray-800">

<button id="logoutBtn"
class="w-full bg-red-500 text-white p-2 rounded">

Logout

</button>

</div>

</aside>


<main class="flex-1 p-8 space-y-10 overflow-y-auto">

<!-- DASHBOARD -->

<section id="dashboard" class="tab">

<h2 class="text-xl font-bold mb-4">Dashboard</h2>

<div class="grid grid-cols-3 gap-6">

<div class="glass p-6 rounded">
<p>Total Users</p>
<h3 id="totalUsers" class="text-3xl font-bold">0</h3>
</div>

<div class="glass p-6 rounded">
<p>Total Courses</p>
<h3 id="totalCourses" class="text-3xl font-bold">0</h3>
</div>

<div class="glass p-6 rounded">
<p>Total Enrollments</p>
<h3 id="totalEnrollments" class="text-3xl font-bold">0</h3>
</div>

</div>

</section>


<!-- USERS -->

<section id="users" class="tab hidden">

<h2 class="text-xl font-bold mb-4">Users</h2>

<input id="userSearch"
placeholder="Search users..."
class="bg-gray-800 p-2 rounded mb-4 w-72">

<table class="w-full text-sm">

<thead class="border-b border-gray-700">

<tr>
<th class="p-3">Name</th>
<th class="p-3">Email</th>
<th class="p-3">Courses</th>
<th class="p-3">Grant</th>
<th class="p-3">Actions</th>
</tr>

</thead>

<tbody id="usersList"></tbody>

</table>

</section>


<!-- COURSES -->

<section id="courses" class="tab hidden">

<h2 class="text-xl font-bold mb-4">Courses</h2>

<div class="space-y-3 mb-6">

<input id="title"
placeholder="Course Title"
class="bg-gray-800 p-2 rounded w-full">

<input id="description"
placeholder="Course Description"
class="bg-gray-800 p-2 rounded w-full">

<input id="thumbnail"
placeholder="Thumbnail Image URL"
class="bg-gray-800 p-2 rounded w-full">

<input id="video"
placeholder="Course Video URL"
class="bg-gray-800 p-2 rounded w-full">

<button id="uploadBtn"
class="bg-cyan-500 px-4 py-2 text-black rounded">

Upload Course

</button>

</div>

<div id="coursesList" class="space-y-3"></div>

</section>

</main>

<div id="toast"
class="fixed bottom-5 right-5 bg-cyan-500 text-black px-4 py-2 rounded hidden">
</div>

<script type="module" src="js/admin.js"></script>

</body>
</html>
```
