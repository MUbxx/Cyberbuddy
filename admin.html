<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberBuddy Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background:#0f172a; font-family: 'Inter', sans-serif; color:#e2e8f0; }
        .glass { background:rgba(30, 41, 59, 0.6); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.05); }
        .tab { display:none; }
        .tab.active { display:block; }
        .sidebar-btn { transition: all 0.2s; border-left: 3px solid transparent; }
        .sidebar-btn:hover { background: rgba(34, 211, 238, 0.1); border-left: 3px solid #22d3ee; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-64 glass flex flex-col p-6 sticky top-0 h-screen">
        <h1 class="text-2xl font-black text-cyan-400 mb-10 text-center">CYBER<span class="text-white">BUDDY</span></h1>
        <nav class="flex-1 space-y-2">
            <button onclick="showTab('dashboard')" class="sidebar-btn w-full text-left p-3 rounded flex items-center gap-3">
                <i class="fas fa-chart-line"></i> Dashboard
            </button>
            <button onclick="showTab('users')" class="sidebar-btn w-full text-left p-3 rounded flex items-center gap-3">
                <i class="fas fa-users"></i> Users
            </button>
            <button onclick="showTab('courses')" class="sidebar-btn w-full text-left p-3 rounded flex items-center gap-3">
                <i class="fas fa-book"></i> Courses
            </button>
            <button onclick="showTab('security')" class="sidebar-btn w-full text-left p-3 rounded flex items-center gap-3">
                <i class="fas fa-user-shield"></i> Security
            </button>
        </nav>
        <button id="logoutBtn" class="bg-red-500/10 text-red-500 border border-red-500/20 hover:bg-red-600 hover:text-white w-full py-3 rounded mt-10 transition font-bold">
            Logout
        </button>
    </aside>

    <main class="flex-1 p-10 space-y-10">
        <section id="dashboard" class="tab active">
            <h2 class="text-3xl font-bold mb-8 text-cyan-400">Admin Overview</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="glass p-8 rounded-xl border-t-4 border-cyan-500">
                    <p class="text-slate-400 uppercase text-xs font-bold mb-2">Total Users</p>
                    <h3 id="totalUsers" class="text-4xl font-black">0</h3>
                </div>
                <div class="glass p-8 rounded-xl border-t-4 border-blue-500">
                    <p class="text-slate-400 uppercase text-xs font-bold mb-2">Total Courses</p>
                    <h3 id="totalCourses" class="text-4xl font-black">0</h3>
                </div>
                <div class="glass p-8 rounded-xl border-t-4 border-green-500">
                    <p class="text-slate-400 uppercase text-xs font-bold mb-2">Total Enrollments</p>
                    <h3 id="totalEnrollments" class="text-4xl font-black">0</h3>
                </div>
            </div>
        </section>

        <section id="users" class="tab">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">User Management</h2>
                <div class="relative">
                    <i class="fas fa-search absolute left-3 top-3 text-gray-500"></i>
                    <input id="userSearch" placeholder="Search by name or email..." class="bg-slate-900 border border-slate-700 pl-10 pr-4 py-2 rounded-lg w-80 focus:border-cyan-400 outline-none">
                </div>
            </div>
            <div class="glass rounded-xl overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-800/50 text-slate-400 uppercase text-xs">
                        <tr>
                            <th class="p-4">Student Name</th>
                            <th class="p-4">Email</th>
                            <th class="p-4">Active Access</th>
                            <th class="p-4">Grant Access</th>
                            <th class="p-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersList"></tbody>
                </table>
            </div>
        </section>

        <section id="courses" class="tab">
            <h2 class="text-2xl font-bold mb-6">Course Management</h2>
            <div class="glass p-6 rounded-xl mb-10 grid grid-cols-2 gap-4">
                <input id="title" placeholder="Course Title" class="bg-slate-900 border border-slate-700 p-3 rounded-lg focus:border-cyan-400 outline-none">
                <input id="thumbnail" placeholder="Thumbnail URL" class="bg-slate-900 border border-slate-700 p-3 rounded-lg focus:border-cyan-400 outline-none">
                <textarea id="description" placeholder="Description" class="col-span-2 bg-slate-900 border border-slate-700 p-3 rounded-lg focus:border-cyan-400 outline-none"></textarea>
                <input id="video" placeholder="Course Video ID/URL" class="col-span-1 bg-slate-900 border border-slate-700 p-3 rounded-lg focus:border-cyan-400 outline-none">
                <button id="uploadBtn" class="bg-cyan-500 hover:bg-cyan-400 text-black font-bold py-3 rounded-lg transition">Upload Course</button>
            </div>
            <div id="coursesList" class="grid grid-cols-1 gap-4"></div>
        </section>

        <section id="security" class="tab">
            <div class="glass p-10 rounded-xl max-w-2xl">
                <h2 class="text-2xl font-bold mb-4">Password Recovery</h2>
                <p class="text-slate-400 mb-6 text-sm">Send a manual password reset email to any student.</p>
                <div class="flex gap-4">
                    <input id="securityEmail" placeholder="Enter student email" class="flex-1 bg-slate-900 border border-slate-700 p-3 rounded-lg outline-none">
                    <button id="resetPassword" class="bg-yellow-500 hover:bg-yellow-400 text-black font-bold px-6 rounded-lg transition">Send Reset Link</button>
                </div>
            </div>
        </section>
    </main>

    <div id="toast" class="fixed bottom-5 right-5 bg-cyan-500 text-black font-bold px-6 py-3 rounded-xl shadow-2xl hidden transform translate-y-0 transition-all"></div>

    <script type="module" src="js/admin.js"></script>
</body>
</html>
