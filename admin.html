<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberBuddy Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background:#0f172a; font-family: 'Inter', sans-serif; color:#e2e8f0; }
        .glass { background:rgba(30, 41, 59, 0.7); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.05); }
        .tab { display:none; }
        .tab.active { display:block; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-64 glass p-6 flex flex-col sticky top-0 h-screen">
        <h1 class="text-2xl font-black text-cyan-400 mb-10">CYBER<span class="text-white">BUDDY</span></h1>
        <nav class="flex-1 space-y-2">
            <button onclick="window.showTab('dashboard')" class="navBtn w-full text-left p-3 hover:bg-slate-800 rounded transition" data-tab="dashboard">Dashboard</button>
            <button onclick="window.showTab('users')" class="navBtn w-full text-left p-3 hover:bg-slate-800 rounded transition" data-tab="users">Users</button>
            <button onclick="window.showTab('courses')" class="navBtn w-full text-left p-3 hover:bg-slate-800 rounded transition" data-tab="courses">Courses</button>
            <button onclick="window.showTab('security')" class="navBtn w-full text-left p-3 hover:bg-slate-800 rounded transition" data-tab="security">Security</button>
        </nav>
        <button id="logoutBtn" class="bg-red-500 hover:bg-red-600 w-full py-2 rounded mt-10 transition font-bold">Logout</button>
    </aside>

    <main class="flex-1 p-10 space-y-10 overflow-y-auto">
        <section id="dashboard" class="tab active">
            <h2 class="text-2xl font-bold mb-6">Dashboard Overview</h2>
            <div class="grid grid-cols-3 gap-6">
                <div class="glass p-6 rounded"> <p class="text-xs text-gray-400">Total Users</p> <h3 id="totalUsers" class="text-3xl font-bold">0</h3> </div>
                <div class="glass p-6 rounded"> <p class="text-xs text-gray-400">Total Courses</p> <h3 id="totalCourses" class="text-3xl font-bold">0</h3> </div>
                <div class="glass p-6 rounded"> <p class="text-xs text-gray-400">Enrollments</p> <h3 id="totalEnrollments" class="text-3xl font-bold">0</h3> </div>
            </div>
        </section>

        <section id="users" class="tab">
            <h2 class="text-xl font-bold mb-4">User Management</h2>
            <div class="glass overflow-x-auto rounded-xl">
                <table class="w-full text-left">
                    <thead class="bg-slate-800/50 text-gray-400 text-xs">
                        <tr> <th class="p-3">Name</th> <th class="p-3">Email</th> <th class="p-3">Courses</th> <th class="p-3">Grant</th> <th class="p-3">Rename</th> <th class="p-3">Actions</th> </tr>
                    </thead>
                    <tbody id="usersList"></tbody>
                </table>
            </div>
        </section>

        <section id="courses" class="tab">
            <h2 class="text-xl font-bold mb-6">Course Builder</h2>
            <div class="glass p-6 rounded mb-8 space-y-3">
                <input id="courseTitle" placeholder="Course Title" class="bg-gray-800 p-2 rounded w-full">
                <input id="courseDescription" placeholder="Description" class="bg-gray-800 p-2 rounded w-full">
                <input id="courseImage" placeholder="Thumbnail URL" class="bg-gray-800 p-2 rounded w-full">
                <button id="createCourse" class="bg-cyan-500 text-black px-4 py-2 rounded font-bold">Create Course</button>
            </div>
            <div id="coursesList" class="space-y-4"></div>
        </section>

        <section id="security" class="tab">
            <h2 class="text-xl font-bold mb-6">Security Settings</h2>
            <div class="glass p-6 rounded max-w-md">
                <input id="resetEmail" placeholder="User Email" class="bg-gray-800 p-2 rounded mb-4 w-full">
                <button id="resetPassword" class="bg-yellow-500 text-black px-4 py-2 rounded w-full font-bold">Send Password Reset</button>
            </div>
        </section>
    </main>

    <div id="toast" class="fixed bottom-5 right-5 bg-cyan-500 text-black font-bold px-6 py-2 rounded hidden shadow-lg"></div>
    <script type="module" src="js/admin.js"></script>
</body>
</html>
