```html
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CyberBuddy Admin</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#0f172a;
font-family:Inter, sans-serif;
color:#e2e8f0;
}

.glass{
background:rgba(30,41,59,.7);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.05);
}

.tab{
display:none;
}

.tab.active{
display:block;
}

</style>

</head>

<body class="flex min-h-screen">

<!-- SIDEBAR -->

<aside class="w-64 glass p-6 space-y-6">

<h1 class="text-2xl font-black text-cyan-400">
CYBER<span class="text-white">BUDDY</span>
</h1>

<nav class="space-y-2">

<button class="navBtn w-full text-left p-3 hover:bg-slate-800 rounded" data-tab="dashboard">
Dashboard
</button>

<button class="navBtn w-full text-left p-3 hover:bg-slate-800 rounded" data-tab="users">
Users
</button>

<button class="navBtn w-full text-left p-3 hover:bg-slate-800 rounded" data-tab="courses">
Courses
</button>

<button class="navBtn w-full text-left p-3 hover:bg-slate-800 rounded" data-tab="security">
Security
</button>

</nav>

<button id="logoutBtn"
class="bg-red-500 w-full py-2 rounded mt-10">
Logout
</button>

</aside>



<!-- MAIN -->

<main class="flex-1 p-10 space-y-10 overflow-y-auto">


<!-- DASHBOARD -->

<section id="dashboard" class="tab active">

<h2 class="text-2xl font-bold mb-6">Dashboard</h2>

<div class="grid grid-cols-3 gap-6">

<div class="glass p-6 rounded">
<p>Total Users</p>
<h3 id="totalUsers" class="text-3xl font-bold">0</h3>
</div>

<div class="glass p-6 rounded">
<p>Total Courses</p>
<h3 id="totalCourses" class="text-3xl font-bold">0</h3>
</div>

<div class="glass p-6 rounded">
<p>Total Enrollments</p>
<h3 id="totalEnrollments" class="text-3xl font-bold">0</h3>
</div>

</div>

</section>



<!-- USERS -->

<section id="users" class="tab">

<h2 class="text-xl font-bold mb-4">Users</h2>

<input id="userSearch"
placeholder="Search users..."
class="bg-gray-800 p-2 rounded mb-4 w-72">

<table class="w-full text-sm">

<thead class="border-b border-gray-700">
<tr>
<th class="p-3">Name</th>
<th class="p-3">Email</th>
<th class="p-3">Courses</th>
<th class="p-3">Grant</th>
<th class="p-3">Actions</th>
</tr>
</thead>

<tbody id="usersList"></tbody>

</table>

</section>



<!-- COURSES -->

<section id="courses" class="tab">

<h2 class="text-xl font-bold mb-6">Course Manager</h2>

<div class="glass p-6 rounded mb-6 space-y-3">

<input id="title" placeholder="Course Title" class="bg-gray-800 p-2 rounded w-full">

<input id="description" placeholder="Course Description" class="bg-gray-800 p-2 rounded w-full">

<input id="thumbnail" placeholder="Thumbnail URL" class="bg-gray-800 p-2 rounded w-full">

<input id="video" placeholder="Video URL" class="bg-gray-800 p-2 rounded w-full">

<button id="uploadBtn"
class="bg-cyan-500 px-4 py-2 text-black rounded">
Upload Course
</button>

</div>

<div id="coursesList" class="space-y-3"></div>

</section>



<!-- SECURITY -->

<section id="security" class="tab">

<h2 class="text-xl font-bold mb-6">Security</h2>

<input id="resetEmail"
placeholder="User Email"
class="bg-gray-800 p-2 rounded mb-4 w-80">

<button id="resetPassword"
class="bg-yellow-500 px-4 py-2 text-black rounded">
Send Password Reset
</button>

</section>

</main>

<div id="toast"
class="fixed bottom-5 right-5 bg-cyan-500 text-black px-4 py-2 rounded hidden"></div>

<script type="module" src="js/admin.js"></script>

</body>
</html>
```
