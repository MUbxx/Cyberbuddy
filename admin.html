<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cyber Buddy Admin</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

body{
background:#0f172a;
}

.glass{
background:rgba(30,41,59,0.7);
backdrop-filter:blur(10px);
}

</style>

</head>

<body class="flex text-gray-100 min-h-screen">

<!-- SIDEBAR -->

<aside class="w-64 glass border-r border-gray-800 flex flex-col">

<div class="p-6">

<h1 class="text-2xl font-black text-cyan-400">
CYBER<span class="text-white">BUDDY</span>
</h1>

<p class="text-xs text-gray-500 uppercase">
Admin Terminal
</p>

</div>

<div class="p-4 border-t border-gray-800">

<button id="logoutBtn"
class="w-full bg-red-500 text-white p-2 rounded-lg">

Logout

</button>

</div>

</aside>



<!-- MAIN -->

<main class="flex-1 overflow-y-auto">

<header class="p-6 border-b border-gray-800">

<h2 class="text-xl font-semibold">
Admin Command Center
</h2>

</header>



<div class="p-8 space-y-8">

<!-- STATS -->

<div class="grid grid-cols-2 gap-6">

<div class="glass p-6 rounded-xl border border-gray-800">

<p class="text-gray-400 text-sm">
Total Users
</p>

<h3 id="totalUsers" class="text-3xl font-bold">
0
</h3>

</div>

<div class="glass p-6 rounded-xl border border-gray-800">

<p class="text-gray-400 text-sm">
Total Courses
</p>

<h3 id="totalCourses" class="text-3xl font-bold">
0
</h3>

</div>

</div>



<!-- USERS TABLE -->

<section class="glass rounded-xl border border-gray-800 overflow-hidden">

<div class="p-4 border-b border-gray-700">

<h3 class="font-bold">
Users
</h3>

</div>

<div class="overflow-x-auto">

<table class="w-full text-left text-sm">

<thead class="text-gray-400 text-xs border-b border-gray-800">

<tr>

<th class="p-4">Name</th>

<th class="p-4">Email</th>

<th class="p-4">Grant Course</th>

<th class="p-4">Action</th>

</tr>

</thead>

<tbody id="usersList"></tbody>

</table>

</div>

</section>



<!-- COURSE UPLOAD -->

<section class="glass p-6 rounded-xl border border-gray-800">

<h3 class="font-bold mb-4">
Upload Course
</h3>

<input id="title"
placeholder="Course Title"
class="w-full bg-gray-800 border border-gray-700 p-3 rounded-lg mb-3">

<input id="video"
placeholder="Video URL"
class="w-full bg-gray-800 border border-gray-700 p-3 rounded-lg mb-3">

<button id="uploadBtn"
class="w-full bg-cyan-500 hover:bg-cyan-400 text-black font-bold py-3 rounded-lg">

Upload Course

</button>

</section>



<!-- COURSES LIST -->

<section class="glass rounded-xl border border-gray-800">

<div class="p-4 border-b border-gray-700">

<h3 class="font-bold">
Courses
</h3>

</div>

<div id="coursesList" class="p-4 space-y-3"></div>

</section>

</div>

</main>

<script type="module" src="js/admin.js"></script>

</body>
</html>
