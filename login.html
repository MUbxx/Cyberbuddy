<!DOCTYPE html>
<html>
<head>

<title>Cyber Buddy Login</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-900 flex items-center justify-center h-screen text-white">

<div class="bg-gray-800 p-8 rounded w-96">

<h2 class="text-2xl mb-6 text-center">Cyber Buddy Login</h2>

<input id="email"
class="w-full p-2 mb-3 text-black rounded"
placeholder="Email">

<input id="password"
type="password"
class="w-full p-2 mb-4 text-black rounded"
placeholder="Password">

<button id="loginBtn"
class="bg-cyan-400 hover:bg-cyan-300 text-black w-full p-2 rounded mb-4">

Login

</button>

<div class="text-center mb-3 text-gray-400">
OR
</div>

<button id="googleLogin"
class="bg-white text-black w-full p-2 rounded flex items-center justify-center gap-2 hover:bg-gray-200">

<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
width="20">

Sign in with Google

</button>

<p class="mt-4 text-sm text-center">
Don't have an account?
<a href="register.html" class="text-cyan-400">Register</a>
</p>

</div>

<script type="module" src="js/auth.js"></script>

</body>
</html>
