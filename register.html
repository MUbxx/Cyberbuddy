<!DOCTYPE html>
<html>
<head>
<title>Register - CyberBuddy</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 flex items-center justify-center h-screen text-white">

<div class="bg-gray-800 p-8 rounded-xl w-96">

<h2 class="text-2xl mb-6 text-center font-bold">Create Account</h2>

<input id="name" class="w-full p-2 mb-3 text-black rounded" placeholder="Full Name">

<input id="phone" class="w-full p-2 mb-3 text-black rounded" placeholder="Phone">

<input id="email" class="w-full p-2 mb-3 text-black rounded" placeholder="Email">

<input id="password" type="password" class="w-full p-2 mb-4 text-black rounded" placeholder="Password">

<button id="registerBtn" class="bg-cyan-400 text-black w-full p-2 rounded">
Create Account
</button>

<p class="mt-4 text-center">
Already have account?
<a href="login.html" class="text-cyan-400">Login</a>
</p>

</div>

<script type="module" src="js/register.js"></script>

</body>
</html>
