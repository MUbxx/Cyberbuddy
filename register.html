<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white flex items-center justify-center h-screen">

<div class="bg-gray-800 p-8 rounded w-96">

<h2 class="text-xl mb-4">Register</h2>

<input id="name" placeholder="Full Name" class="w-full p-2 mb-3 text-black">

<input id="email" placeholder="Email" class="w-full p-2 mb-3 text-black">

<input id="password" type="password" placeholder="Password" class="w-full p-2 mb-3 text-black">

<button id="registerBtn" class="bg-cyan-400 text-black w-full p-2">Register</button>

</div>

<script type="module" src="./js/auth.js"></script>

</body>
</html>
